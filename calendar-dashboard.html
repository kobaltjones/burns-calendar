<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Burns Family Calendar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #000;
    --surface: #0a0a0a;
    --accent: #7c9ef5;
    --text: #f0f2ff;
    --text2: #9099b8;
    --text3: #5a6180;
    --border: rgba(255,255,255,0.1);
  }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    width: 100%;
    overflow-x: hidden;
  }
  #app { max-width: 1200px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

  /* BANNER */
  #header {
    position: relative;
    width: 100%;
    height: 220px;
    overflow: hidden;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #header-img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 50%;
    display: block;
  }
  #header-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.35) 55%, rgba(0,0,0,0.0) 100%);
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding: 18px 28px 0;
  }
  #header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  #month-display {
    font-family: 'DM Serif Display', serif;
    font-size: 72px;
    line-height: 1;
    color: #fff;
    letter-spacing: -2px;
    text-shadow: 0 2px 16px rgba(0,0,0,0.8);
  }
  #time {
    font-family: 'DM Sans', sans-serif;
    font-size: 44px;
    font-weight: 400;
    color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.8);
    letter-spacing: -1px;
  }
  #date-full { display: none; }
  #family-name { display: none; }
  #subtitle { display: none; }

  /* TABS — inside banner, below the month/time row */
  #tabs {
    display: flex; gap: 8px;
    padding: 0;
    flex-shrink: 0;
  }
  .tab {
    padding: 7px 22px;
    border-radius: 100px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid rgba(255,255,255,0.35);
    background: rgba(0,0,0,0.4);
    color: rgba(255,255,255,0.75);
    font-family: 'DM Sans', sans-serif;
    -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(4px);
  }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tab:active { opacity: 0.75; }

  /* CONTENT */
  #content { flex: 1; padding: 24px 28px; overflow-y: auto; }
  #status { text-align: center; padding: 60px 20px; color: var(--text2); font-size: 20px; }

  /* LIST VIEW */
  .list-group { margin-bottom: 32px; }
  .list-date-header {
    font-size: 14px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 10px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .list-date-header.today-header { color: var(--accent); }
  .list-event {
    display: flex; align-items: flex-start; gap: 16px;
    padding: 18px 20px; background: #111; border-radius: 14px;
    margin-bottom: 10px; border-left: 4px solid var(--accent);
  }
  .list-event-time { font-size: 20px; color: var(--text2); font-weight: 500; min-width: 90px; padding-top: 2px; }
  .list-event-name { font-size: 26px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .list-event-detail { font-size: 17px; color: var(--text2); margin-top: 4px; }
  .all-day-badge {
    display: inline-block; background: #222; color: var(--accent);
    font-size: 13px; font-weight: 600; padding: 4px 12px;
    border-radius: 100px; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .no-events { color: var(--text3); font-size: 20px; text-align: center; padding: 40px 0; }

  /* WEEK VIEW */
  .week-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 0; border-left: 1px solid var(--border);
  }
  .week-day {
    background: #000; padding: 16px 12px 20px;
    min-height: 380px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    border-top: 1px solid var(--border);
  }
  .week-day-name {
    font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.4);
    text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px;
  }
  .week-day-num-wrap { margin-bottom: 14px; }
  .week-day-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 48px; height: 48px; font-size: 32px; font-weight: 600;
    color: #fff; line-height: 1; border-radius: 50%;
  }
  .week-day.today-col .week-day-num { background: #e53935; color: #fff; }
  .week-event {
    font-size: 15px; color: rgba(255,255,255,0.9); font-weight: 400;
    margin-bottom: 10px; line-height: 1.4; word-break: break-word; padding-left: 2px;
  }
  .week-event-time { color: rgba(255,255,255,0.4); font-size: 13px; display: block; margin-bottom: 2px; }

  /* MONTH VIEW */
  .month-header-row {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 0; border-left: 1px solid var(--border); margin-bottom: 0;
  }
  .month-dow {
    text-align: left; font-size: 13px; font-weight: 600;
    color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 1.2px;
    padding: 8px 10px;
    border-right: 1px solid var(--border);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    background: #000;
  }
  .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0; border-left: 1px solid var(--border); }
  .month-cell {
    background: #000; min-height: 120px; padding: 10px 10px 8px;
    border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
  }
  .month-cell.other-month { opacity: 0.2; }
  .month-cell-num-wrap { margin-bottom: 6px; }
  .month-cell-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; font-size: 22px; font-weight: 600;
    color: #fff; line-height: 1; border-radius: 50%;
  }
  .month-cell.today-cell .month-cell-num { background: #e53935; color: #fff; }
  .month-ev {
    font-size: 13px; color: rgba(255,255,255,0.85); font-weight: 400;
    margin-bottom: 3px; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; padding-left: 2px; line-height: 1.5;
  }
  .month-ev-time { color: rgba(255,255,255,0.35); }
  .month-more { font-size: 11px; color: var(--text3); padding: 1px 0; }

  #refresh-bar { padding: 8px 28px; font-size: 12px; color: var(--text3); text-align: right; border-top: 1px solid var(--border); }
</style>
</head>

    <div id="header-overlay">
      <div id="header-top">
        <div id="month-display">April</div>
        <div id="time">12:00 PM</div>
      </div>
      <div id="tabs">
        <button class="tab active" onclick="setView('list')">List</button>
        <button class="tab" onclick="setView('week')">Week</button>
        <button class="tab" onclick="setView('month')">Month</button>
      </div>
    </div>
  </div>

  <div id="content">
    <div id="status">Loading calendar...</div>
  </div>

  <div id="refresh-bar">Auto-refreshes every 5 minutes</div>

</div>
<script>
const ICAL_URL = 'https://calendar.google.com/calendar/ical/larryburns39%40gmail.com/public/basic.ics';
const PROXIES = ['https://corsproxy.io/?url=','https://api.allorigins.win/raw?url=','https://thingproxy.freeboard.io/fetch/'];
let currentView = 'list';
let allEvents = [];
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function setView(v) {
  currentView = v;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  render();
}
function updateClock() {
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('time').textContent = h + ':' + String(m).padStart(2,'0') + ' ' + ampm;
  document.getElementById('month-display').textContent = MONTHS[now.getMonth()];
}
function parseIcal(text) {
  const events = [];
  const lines = text.replace(/\r\n /g,'').replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  let ev = null;
  for (let line of lines) {
    if (line === 'BEGIN:VEVENT') { ev = {}; continue; }
    if (line === 'END:VEVENT') { if (ev && ev.start) events.push(ev); ev = null; continue; }
    if (!ev) continue;
    const colon = line.indexOf(':');
    if (colon < 0) continue;
    const key = line.substring(0, colon).split(';')[0].toUpperCase();
    const val = line.substring(colon + 1).trim();
    if (key === 'SUMMARY') ev.title = val.replace(/\\,/g,',').replace(/\\n/g,' ').replace(/\\;/g,';');
    if (key === 'LOCATION') ev.location = val.replace(/\\,/g,',');
    if (key === 'DTSTART') { ev.allDay = !val.includes('T'); ev.start = parseIcalDate(line.substring(colon+1).trim()); }
    if (key === 'DTEND') ev.end = parseIcalDate(line.substring(colon+1).trim());
    if (key === 'RRULE') ev.rrule = val;
  }
  return events;
}
function parseIcalDate(str) {
  str = str.split(';').pop();
  const y=parseInt(str.substring(0,4)), mo=parseInt(str.substring(4,6))-1, d=parseInt(str.substring(6,8));
  if (!str.includes('T')) return new Date(y,mo,d);
  const h=parseInt(str.substring(9,11)), m=parseInt(str.substring(11,13)), s=parseInt(str.substring(13,15));
  if (str.endsWith('Z')) return new Date(Date.UTC(y,mo,d,h,m,s));
  return new Date(y,mo,d,h,m,s);
}
function expandRecurring(ev, from, to) {
  if (!ev.rrule) return [];
  const results = [], parts = {};
  ev.rrule.split(';').forEach(p => { const [k,v] = p.split('='); parts[k]=v; });
  const freq=parts.FREQ, count=parts.COUNT?parseInt(parts.COUNT):200;
  const until=parts.UNTIL?parseIcalDate(parts.UNTIL):null;
  const interval=parts.INTERVAL?parseInt(parts.INTERVAL):1;
  const dur=ev.end?(ev.end-ev.start):0;
  let cur=new Date(ev.start), n=0;
  while (cur<=to && n<count) {
    if (until && cur>until) break;
    if (cur>=from && cur<=to) results.push({...ev,start:new Date(cur),end:new Date(cur.getTime()+dur)});
    if (freq==='DAILY') cur=new Date(cur.getTime()+86400000*interval);
    else if (freq==='WEEKLY') cur=new Date(cur.getTime()+7*86400000*interval);
    else if (freq==='MONTHLY') { cur=new Date(cur); cur.setMonth(cur.getMonth()+interval); }
    else if (freq==='YEARLY') { cur=new Date(cur); cur.setFullYear(cur.getFullYear()+interval); }
    else break;
    n++;
  }
  return results;
}
function getEventsForRange(from, to) {
  const result = [];
  for (const ev of allEvents) {
    if (ev.rrule) result.push(...expandRecurring(ev,from,to));
    else if (ev.start>=from && ev.start<=to) result.push(ev);
  }
  return result.sort((a,b)=>a.start-b.start);
}
function formatTime(date) {
  let h=date.getHours(), m=date.getMinutes();
  const ampm=h>=12?'PM':'AM';
  h=h%12||12;
  return h+(m?':'+String(m).padStart(2,'0'):'')+' '+ampm;
}
function isSameDay(a,b) { return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }

function renderList() {
  const now=new Date();
  const from=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const to=new Date(from.getTime()+60*86400000);
  const events=getEventsForRange(from,to);
  if (!events.length) return '<div class="no-events">No upcoming events in the next 60 days</div>';
  const byDay={};
  for (const ev of events) { const k=ev.start.toDateString(); if(!byDay[k])byDay[k]=[]; byDay[k].push(ev); }
  let html='';
  for (const key of Object.keys(byDay)) {
    const d=new Date(key), isToday=isSameDay(d,now), isTom=isSameDay(d,new Date(now.getTime()+86400000));
    let label=DAYS[d.getDay()]+', '+MONTHS[d.getMonth()]+' '+d.getDate();
    if(isToday)label='Today — '+label; else if(isTom)label='Tomorrow — '+label;
    html+=`<div class="list-group"><div class="list-date-header ${isToday?'today-header':''}">${label}</div>`;
    for (const ev of byDay[key]) {
      html+=`<div class="list-event">
        <div class="list-event-time">${ev.allDay?'<span class="all-day-badge">All day</span>':formatTime(ev.start)}</div>
        <div><div class="list-event-name">${ev.title||'Event'}</div>${ev.location?`<div class="list-event-detail">${ev.location}</div>`:''}</div>
      </div>`;
    }
    html+='</div>';
  }
  return html;
}
function renderWeek() {
  const now=new Date(), dow=now.getDay();
  const sunday=new Date(now.getFullYear(),now.getMonth(),now.getDate()-dow);
  const satEnd=new Date(sunday.getTime()+7*86400000);
  const events=getEventsForRange(sunday,satEnd);
  let html='<div class="week-grid">';
  for (let i=0;i<7;i++) {
    const day=new Date(sunday.getTime()+i*86400000), isToday=isSameDay(day,now);
    const dayEvents=events.filter(e=>isSameDay(e.start,day));
    html+=`<div class="week-day ${isToday?'today-col':''}">
      <div class="week-day-name">${DAYS_SHORT[i]}</div>
      <div class="week-day-num-wrap"><span class="week-day-num">${day.getDate()}</span></div>`;
    for (const ev of dayEvents) {
      html+=`<div class="week-event">${ev.allDay?'':`<span class="week-event-time">${formatTime(ev.start)}</span>`}${ev.title||'Event'}</div>`;
    }
    html+='</div>';
  }
  return html+'</div>';
}
function renderMonth() {
  const now=new Date();
  const first=new Date(now.getFullYear(),now.getMonth(),1);
  const last=new Date(now.getFullYear(),now.getMonth()+1,0);
  const pad=first.getDay();
  const gridStart=new Date(first.getTime()-pad*86400000);
  const total=Math.ceil((pad+last.getDate())/7)*7;
  const gridEnd=new Date(gridStart.getTime()+total*86400000);
  const events=getEventsForRange(gridStart,gridEnd);
  let html='<div class="month-header-row">';
  for (const d of DAYS_SHORT) html+=`<div class="month-dow">${d}</div>`;
  html+='</div><div class="month-grid">';
  for (let i=0;i<total;i++) {
    const cell=new Date(gridStart.getTime()+i*86400000);
    const inMonth=cell.getMonth()===now.getMonth(), isToday=isSameDay(cell,now);
    const dayEvents=events.filter(e=>isSameDay(e.start,cell));
    html+=`<div class="month-cell ${!inMonth?'other-month':''} ${isToday?'today-cell':''}">
      <div class="month-cell-num-wrap"><span class="month-cell-num">${cell.getDate()}</span></div>`;
    const show=dayEvents.slice(0,4), more=dayEvents.length-show.length;
    for (const ev of show) {
      const t=ev.allDay?'':`<span class="month-ev-time">${formatTime(ev.start).replace(' AM','a').replace(' PM','p')} </span>`;
      html+=`<div class="month-ev">${t}${ev.title||'Event'}</div>`;
    }
    if(more>0) html+=`<div class="month-more">+${more} more</div>`;
    html+='</div>';
  }
  return html+'</div>';
}
function render() {
  if (!allEvents.length) return;
  const c=document.getElementById('content');
  if (currentView==='list') c.innerHTML=renderList();
  else if (currentView==='week') c.innerHTML=renderWeek();
  else c.innerHTML=renderMonth();
}
async function loadCalendar() {
  document.getElementById('content').innerHTML='<div id="status">Loading calendar...</div>';
  let text=null;
  const attempts=[ICAL_URL,...PROXIES.map(p=>p+encodeURIComponent(ICAL_URL))];
  for (const url of attempts) {
    try {
      const res=await fetch(url,{mode:'cors',cache:'no-store'});
      if (res.ok) { const t=await res.text(); if(t.includes('BEGIN:VCALENDAR')){text=t;break;} }
    } catch(e){continue;}
  }
  if (!text) {
    document.getElementById('content').innerHTML='<div id="status">Could not load calendar. Will retry in 5 minutes.<br><small style="color:#5a6180;font-size:14px;">Make sure the iPad has an internet connection.</small></div>';
    return;
  }
  allEvents=parseIcal(text);
  document.getElementById('refresh-bar').textContent='Last updated: '+formatTime(new Date());
  render();
}
updateClock();
setInterval(updateClock,30000);
loadCalendar();
setInterval(loadCalendar,5*60*1000);
</script>
