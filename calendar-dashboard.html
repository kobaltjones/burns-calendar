<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Burns Family Calendar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #7c9ef5;
    --accent2: #a78bfa;
    --text: #f0f2ff;
    --text2: #9099b8;
    --text3: #5a6180;
    --today: #7c9ef5;
    --event1: #7c9ef5;
    --event2: #a78bfa;
    --event3: #5ecfb1;
    --border: rgba(255,255,255,0.07);
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    width: 100%;
    overflow-x: hidden;
  }

  #app {
    max-width: 1024px;
    margin: 0 auto;
    padding: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  #header {
    padding: 24px 28px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  #month-display {
    font-family: 'DM Serif Display', serif;
    font-size: 72px;
    line-height: 1;
    color: var(--text);
    letter-spacing: -2px;
  }

  #clock-block {}
  #time {
    font-family: 'DM Sans', sans-serif;
    font-size: 28px;
    font-weight: 500;
    color: var(--text2);
    letter-spacing: 0;
    text-align: right;
  }
  #date-full { display: none; }

  #header-right {
    text-align: right;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }
  #family-name {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--accent2);
    letter-spacing: 0.5px;
  }
  #subtitle { display: none; }

  /* VIEW TABS */
  #tabs {
    display: flex;
    gap: 8px;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    padding: 10px 24px;
    border-radius: 100px;
    font-size: 17px;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text2);
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .tab:active { opacity: 0.75; }

  /* CONTENT */
  #content {
    flex: 1;
    padding: 24px 28px;
    overflow-y: auto;
  }

  /* LOADING / ERROR */
  #status {
    text-align: center;
    padding: 60px 20px;
    color: var(--text2);
    font-size: 20px;
  }

  /* ===== LIST VIEW ===== */
  .list-group { margin-bottom: 32px; }
  .list-date-header {
    font-size: 13px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .list-date-header.today-header {
    color: var(--accent);
  }

  .list-event {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 16px 18px;
    background: var(--surface);
    border-radius: 14px;
    margin-bottom: 10px;
    border-left: 4px solid var(--event1);
  }
  .list-event:nth-child(3n+1) { border-left-color: var(--event1); }
  .list-event:nth-child(3n+2) { border-left-color: var(--event2); }
  .list-event:nth-child(3n+3) { border-left-color: var(--event3); }

  .list-event-time {
    font-size: 17px;
    color: var(--text2);
    font-weight: 500;
    min-width: 80px;
    padding-top: 2px;
  }
  .list-event-name {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .list-event-detail {
    font-size: 15px;
    color: var(--text2);
    margin-top: 4px;
  }
  .all-day-badge {
    display: inline-block;
    background: var(--surface2);
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 100px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .no-events {
    color: var(--text3);
    font-size: 18px;
    text-align: center;
    padding: 40px 0;
  }

  /* ===== WEEK VIEW — DAKboard style ===== */
  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0;
    border-left: 1px solid rgba(255,255,255,0.1);
  }
  .week-day {
    background: #000;
    padding: 16px 10px 20px;
    min-height: 340px;
    border-right: 1px solid rgba(255,255,255,0.1);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .week-day-name {
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
  }
  .week-day-num-wrap {
    margin-bottom: 14px;
  }
  .week-day-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 42px;
    height: 42px;
    font-size: 26px;
    font-weight: 600;
    color: #fff;
    line-height: 1;
    border-radius: 50%;
  }
  .week-day.today-col .week-day-num {
    background: #e53935;
    color: #fff;
  }
  .week-event {
    font-size: 13px;
    color: rgba(255,255,255,0.9);
    font-weight: 400;
    margin-bottom: 7px;
    line-height: 1.35;
    word-break: break-word;
    padding-left: 2px;
  }
  .week-event-time {
    color: rgba(255,255,255,0.45);
    font-size: 12px;
    display: block;
    margin-bottom: 1px;
  }

  /* ===== MONTH VIEW — DAKboard style ===== */
  .month-header-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0;
    border-left: 1px solid rgba(255,255,255,0.1);
    margin-bottom: 0;
  }
  .month-dow {
    text-align: left;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 8px 10px;
    border-right: 1px solid rgba(255,255,255,0.1);
    border-top: 1px solid rgba(255,255,255,0.1);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    background: #000;
  }
  .month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0;
    border-left: 1px solid rgba(255,255,255,0.1);
  }
  .month-cell {
    background: #000;
    min-height: 110px;
    padding: 10px 10px 8px;
    border-right: 1px solid rgba(255,255,255,0.1);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    position: relative;
  }
  .month-cell.other-month { opacity: 0.25; }
  .month-cell-num-wrap {
    margin-bottom: 6px;
  }
  .month-cell-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    line-height: 1;
    border-radius: 50%;
  }
  .month-cell.today-cell .month-cell-num {
    background: #e53935;
    color: #fff;
  }
  .month-ev {
    font-size: 11px;
    color: rgba(255,255,255,0.85);
    font-weight: 400;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding-left: 2px;
    line-height: 1.4;
  }
  .month-ev-time {
    color: rgba(255,255,255,0.4);
  }
  .month-more {
    font-size: 11px;
    color: var(--text3);
    padding: 1px 0;
  }

  /* REFRESH indicator */
  #refresh-bar {
    padding: 8px 28px;
    font-size: 12px;
    color: var(--text3);
    text-align: right;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="month-display">April</div>
    <div id="header-right">
      <div id="time">12:00 PM</div>
      <div id="family-name">Burns Family</div>
    </div>
  </div>

  <div id="tabs">
    <button class="tab active" onclick="setView('list')">List</button>
    <button class="tab" onclick="setView('week')">Week</button>
    <button class="tab" onclick="setView('month')">Month</button>
  </div>

  <div id="content">
    <div id="status">Loading calendar...</div>
  </div>

  <div id="refresh-bar" id="refresh-bar">Auto-refreshes every 30 minutes</div>

</div>

<script>
const ICAL_URL = 'https://calendar.google.com/calendar/ical/larryburns39%40gmail.com/public/basic.ics';
const PROXIES = [
  'https://corsproxy.io/?url=',
  'https://proxy.cors.sh/',
  'https://yacdn.org/proxy/',
];

let currentView = 'list';
let allEvents = [];
let lastRefresh = null;

const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function setView(v) {
  currentView = v;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function updateClock() {
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('time').textContent = h + ':' + String(m).padStart(2,'0') + ' ' + ampm;
  document.getElementById('month-display').textContent = MONTHS[now.getMonth()];
}

function parseIcal(text) {
  const events = [];
  const lines = text.replace(/\r\n /g,'').replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  let ev = null;
  for (let line of lines) {
    if (line === 'BEGIN:VEVENT') { ev = {}; continue; }
    if (line === 'END:VEVENT') { if (ev && ev.start) events.push(ev); ev = null; continue; }
    if (!ev) continue;
    const colon = line.indexOf(':');
    if (colon < 0) continue;
    const key = line.substring(0, colon).split(';')[0].toUpperCase();
    const val = line.substring(colon + 1).trim();
    if (key === 'SUMMARY') ev.title = val.replace(/\\,/g,',').replace(/\\n/g,' ').replace(/\\;/g,';');
    if (key === 'LOCATION') ev.location = val.replace(/\\,/g,',');
    if (key === 'DESCRIPTION') ev.description = val.replace(/\\n/g,' ').replace(/\\,/g,',');
    if (key === 'DTSTART') {
      ev.allDay = !val.includes('T');
      ev.start = parseIcalDate(line.substring(colon+1).trim());
    }
    if (key === 'DTEND') ev.end = parseIcalDate(line.substring(colon+1).trim());
    if (key === 'RRULE') ev.rrule = val;
  }
  return events;
}

function parseIcalDate(str) {
  str = str.split(';').pop();
  const isDate = !str.includes('T');
  const y = parseInt(str.substring(0,4));
  const mo = parseInt(str.substring(4,6))-1;
  const d = parseInt(str.substring(6,8));
  if (isDate) return new Date(y, mo, d);
  const h = parseInt(str.substring(9,11));
  const m = parseInt(str.substring(11,13));
  const s = parseInt(str.substring(13,15));
  if (str.endsWith('Z')) return new Date(Date.UTC(y,mo,d,h,m,s));
  return new Date(y,mo,d,h,m,s);
}

function expandRecurring(ev, from, to) {
  if (!ev.rrule) return [];
  const results = [];
  const parts = {};
  ev.rrule.split(';').forEach(p => { const [k,v] = p.split('='); parts[k]=v; });
  const freq = parts.FREQ;
  const count = parts.COUNT ? parseInt(parts.COUNT) : 200;
  const until = parts.UNTIL ? parseIcalDate(parts.UNTIL) : null;
  const interval = parts.INTERVAL ? parseInt(parts.INTERVAL) : 1;
  const dur = ev.end ? (ev.end - ev.start) : 0;
  let cur = new Date(ev.start);
  let n = 0;
  while (cur <= to && n < count) {
    if (until && cur > until) break;
    if (cur >= from && cur <= to) {
      results.push({ ...ev, start: new Date(cur), end: new Date(cur.getTime() + dur), _recurring: true });
    }
    if (freq === 'DAILY') cur = new Date(cur.getTime() + 86400000 * interval);
    else if (freq === 'WEEKLY') cur = new Date(cur.getTime() + 7 * 86400000 * interval);
    else if (freq === 'MONTHLY') { cur = new Date(cur); cur.setMonth(cur.getMonth() + interval); }
    else if (freq === 'YEARLY') { cur = new Date(cur); cur.setFullYear(cur.getFullYear() + interval); }
    else break;
    n++;
  }
  return results;
}

function getEventsForRange(from, to) {
  const result = [];
  for (const ev of allEvents) {
    if (ev.rrule) {
      result.push(...expandRecurring(ev, from, to));
    } else if (ev.start >= from && ev.start <= to) {
      result.push(ev);
    }
  }
  result.sort((a,b) => a.start - b.start);
  return result;
}

function formatTime(date, allDay) {
  if (allDay) return '';
  let h = date.getHours(), m = date.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return h + (m ? ':' + String(m).padStart(2,'0') : '') + ' ' + ampm;
}

function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

function renderList() {
  const now = new Date();
  const from = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const to = new Date(from.getTime() + 60 * 86400000);
  const events = getEventsForRange(from, to);

  if (!events.length) return '<div class="no-events">No upcoming events in the next 60 days</div>';

  const byDay = {};
  for (const ev of events) {
    const key = ev.start.toDateString();
    if (!byDay[key]) byDay[key] = [];
    byDay[key].push(ev);
  }

  let html = '';
  for (const key of Object.keys(byDay)) {
    const d = new Date(key);
    const isToday = isSameDay(d, now);
    const isTom = isSameDay(d, new Date(now.getTime() + 86400000));
    let label = DAYS[d.getDay()] + ', ' + MONTHS[d.getMonth()] + ' ' + d.getDate();
    if (isToday) label = 'Today — ' + label;
    else if (isTom) label = 'Tomorrow — ' + label;
    html += `<div class="list-group">
      <div class="list-date-header ${isToday ? 'today-header' : ''}">${label}</div>`;
    for (const ev of byDay[key]) {
      const timeStr = ev.allDay ? '' : formatTime(ev.start, false);
      html += `<div class="list-event">
        <div class="list-event-time">${ev.allDay ? '<span class="all-day-badge">All day</span>' : timeStr}</div>
        <div>
          <div class="list-event-name">${ev.title || 'Event'}</div>
          ${ev.location ? `<div class="list-event-detail">${ev.location}</div>` : ''}
        </div>
      </div>`;
    }
    html += '</div>';
  }
  return html;
}

function renderWeek() {
  const now = new Date();
  const dow = now.getDay();
  const sunday = new Date(now.getFullYear(), now.getMonth(), now.getDate() - dow);
  const saturday = new Date(sunday.getTime() + 6 * 86400000);
  const satEnd = new Date(saturday.getTime() + 86400000);
  const events = getEventsForRange(sunday, satEnd);

  let html = '<div class="week-grid">';
  for (let i = 0; i < 7; i++) {
    const day = new Date(sunday.getTime() + i * 86400000);
    const isToday = isSameDay(day, now);
    const dayEvents = events.filter(e => isSameDay(e.start, day));
    html += `<div class="week-day ${isToday ? 'today-col' : ''}">
      <div class="week-day-name">${DAYS_SHORT[i]}</div>
      <div class="week-day-num-wrap"><span class="week-day-num">${day.getDate()}</span></div>`;
    for (const ev of dayEvents) {
      const timeStr = ev.allDay ? '' : `<span class="week-event-time">${formatTime(ev.start, false)}</span>`;
      html += `<div class="week-event">${timeStr}${ev.title || 'Event'}</div>`;
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function renderMonth() {
  const now = new Date();
  const firstOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
  const lastOfMonth = new Date(now.getFullYear(), now.getMonth()+1, 0);
  const startPad = firstOfMonth.getDay();
  const gridStart = new Date(firstOfMonth.getTime() - startPad * 86400000);
  const totalCells = Math.ceil((startPad + lastOfMonth.getDate()) / 7) * 7;
  const gridEnd = new Date(gridStart.getTime() + totalCells * 86400000);
  const events = getEventsForRange(gridStart, gridEnd);

  let html = `<div style="font-size:22px; font-weight:600; color:#fff; margin-bottom:12px; letter-spacing:0.5px; text-align:left;">${MONTHS[now.getMonth()]}</div>`;
  html += '<div class="month-header-row">';
  for (const d of DAYS_SHORT) html += `<div class="month-dow">${d}</div>`;
  html += '</div><div class="month-grid">';

  for (let i = 0; i < totalCells; i++) {
    const cell = new Date(gridStart.getTime() + i * 86400000);
    const inMonth = cell.getMonth() === now.getMonth();
    const isToday = isSameDay(cell, now);
    const dayEvents = events.filter(e => isSameDay(e.start, cell));
    html += `<div class="month-cell ${!inMonth ? 'other-month' : ''} ${isToday ? 'today-cell' : ''}">
      <div class="month-cell-num-wrap"><span class="month-cell-num">${cell.getDate()}</span></div>`;
    const show = dayEvents.slice(0, 4);
    const more = dayEvents.length - show.length;
    for (const ev of show) {
      const t = ev.allDay ? '' : `<span class="month-ev-time">${formatTime(ev.start, false).replace(' AM','a').replace(' PM','p')} </span>`;
      html += `<div class="month-ev">${t}${ev.title || 'Event'}</div>`;
    }
    if (more > 0) html += `<div class="month-more">+${more} more</div>`;
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function render() {
  const c = document.getElementById('content');
  if (!allEvents.length) return;
  if (currentView === 'list') c.innerHTML = renderList();
  else if (currentView === 'week') c.innerHTML = renderWeek();
  else c.innerHTML = renderMonth();
}

async function loadCalendar() {
  document.getElementById('content').innerHTML = '<div id="status">Loading calendar...</div>';
  let text = null;

  const attempts = [
    ICAL_URL,
    ...PROXIES.map(p => p + encodeURIComponent(ICAL_URL))
  ];

  for (const url of attempts) {
    try {
      const res = await fetch(url, { mode: 'cors', cache: 'no-store' });
      if (res.ok) {
        const t = await res.text();
        if (t.includes('BEGIN:VCALENDAR')) { text = t; break; }
      }
    } catch(e) { continue; }
  }

  if (!text) {
    document.getElementById('content').innerHTML = '<div id="status">Could not load calendar. Will retry in 5 minutes.<br><small style="color:var(--text3);font-size:14px;">Make sure the iPad has an internet connection.</small></div>';
    return;
  }
  allEvents = parseIcal(text);
  lastRefresh = new Date();
  document.getElementById('refresh-bar').textContent = 'Last updated: ' + formatTime(lastRefresh, false);
  render();
}

updateClock();
setInterval(updateClock, 30000);
loadCalendar();
setInterval(loadCalendar, 5 * 60 * 1000);
</script>
</body>
</html>
